experiment:
  name: 单次LV隐藏物种实验
  output_dir: runs/single_lv_hidden_experiment
  model_type: full
  seed: 42

simulation:
  total_steps: 520
  warmup_steps: 120
  observed_species: 10
  hidden_species: 2
  dt: 0.04
  process_noise: 0.002

data:
  history_length: 24
  horizon: 25
  delay_length: 6
  delay_stride: 1
  train_ratio: 0.7
  val_ratio: 0.15
  batch_size: 32
  num_workers: 0

model:
  embedding_dim: 96
  global_dim: 96
  edge_hidden_dim: 96
  num_message_passing_layers: 3
  num_hidden_nodes: 2
  decoder_hidden_dim: 96
  dropout: 0.08
  use_layer_norm: true
  use_latent_recurrence: true
  use_species_embeddings: true
  max_log_delta: 0.3

loss:
  one_step: mse
  lambda_1step: 1.0
  lambda_rollout: 0.8
  lambda_range: 0.05
  lambda_sparse: 0.0001
  lambda_meta: 0.0
  lambda_smooth: 0.02
  lambda_balance: 0.01
  range_margin: 0.3
  balance_target_min_ratio: 0.12

train:
  device: cpu
  epochs: 35
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stopping_patience: 10
  stage_a_epochs: 6
  stage_b_epochs: 10
  stage_b_horizon: 8
  max_rollout_horizon: 25
  teacher_forcing_ratio_stage_b: 0.45
  checkpoint_name: best.pt
  curriculum:
    horizons: [1, 2, 4, 6, 8, 12, 16, 20, 25]
    stage_epochs: [4, 3, 3, 3, 3, 4, 5, 5, 5]
    teacher_forcing: [1.0, 0.75, 0.65, 0.55, 0.45, 0.30, 0.18, 0.08, 0.0]
    lr_multipliers: [1.0, 1.0, 0.95, 0.95, 0.9, 0.85, 0.75, 0.65, 0.55]

eval:
  horizons: [5, 10, 20, 25]
  primary_horizon: 20
  analysis_window_index: 0

takens:
  tau: 1
  m: 6
  representative_species_index: 0

viz:
  max_species_in_rollout_plot: 4
