# 关键实验：纯 LV + 无 hidden 监督
# 架构：只有 encoder + LV drift + noise（无 residual，无 hidden_fast）
# 监督：只有 visible loss（无任何 hidden/interaction 真值）
# 目的：如果 visible loss + LV 结构能约束 hidden → 证明真的是 partial observation

experiment:
  seed: 42
  name: exp_pure_lv_no_supervision
  runs_dir: runs

simulation:
  generator: lv
  visible_species: 5
  hidden_species: 1
  total_steps: 820
  warmup_steps: 160
  process_noise: 0.006
  max_attempts: 640
  max_state_value: 5.5

data:
  history_length: 24
  delay_length: 6
  delay_stride: 2
  train_horizon: 18
  full_context_train_ratio: 0.72
  figure_rollout_horizon: 18
  train_ratio: 0.60
  val_ratio: 0.20
  batch_size: 48
  num_workers: 0

model:
  delay_embedding_dim: 12
  context_dim: 40
  hidden_dim: 64
  encoder_layers: 2
  residual_layers: 3
  use_environment_latent: false
  use_lv_guidance: true
  lv_form: tanh
  use_residual: false         # ← 关键：关闭 residual
  use_hidden_fast: false      # ← 关键：关闭 hidden fast
  base_visible_noise: 0.015
  base_hidden_noise: 0.012

train:
  device: cpu
  epochs: 40
  early_stopping_patience: 12
  learning_rate: 0.0018
  weight_decay: 0.0001
  grad_clip: 1.0
  noise_scan_epochs: 6
  noise_scan_patience: 3

noise:
  particle_rollout_K: 4
  particle_aggregation: mean
  train_particles: 1
  eval_particles: 2
  tested_rollout_noise: [0.01, 0.02]
  tested_input_noise: [0.005, 0.01]
  tested_latent_perturb: [0.01, 0.02]

loss:
  # 只保留 visible 损失（观测到的才有权监督）
  lambda_visible_one_step: 0.8
  lambda_visible_rollout: 1.0
  lambda_peak_visible: 0.9
  lambda_slope: 0.55
  lambda_amplitude: 0.60
  lambda_full_context_visible: 0.9

  # ↓↓↓ 全部 hidden/interaction 真值监督归零
  lambda_hidden_initial: 0.0
  lambda_hidden_rollout: 0.0
  lambda_full_context_hidden: 0.0
  lambda_interaction_hidden: 0.0
  # ↑↑↑

  # 正则项保留（不用真值）
  lambda_interaction_sparse: 0.00015
  lambda_hidden_smooth: 0.008

  # LV/residual 相关（residual 已关，但权重保留以防将来再开）
  lambda_lv_guidance: 0.0        # 去掉：没意义了（没有 residual 来对比）
  lambda_residual_magnitude: 0.0  # 去掉：没有 residual 了
  lambda_particle_consistency: 0.0

  peak_quantile: 0.75
