experiment:
  name: 单隐藏物种反演实验
  output_dir: runs/hidden_inference_experiment
  seed: 42

simulation:
  total_steps: 620
  warmup_steps: 180
  observed_species: 9
  hidden_species: 1
  dt: 0.03
  process_noise: 0.0015

data:
  history_length: 24
  horizon: 1
  delay_length: 6
  delay_stride: 1
  train_ratio: 0.7
  val_ratio: 0.15
  batch_size: 32
  num_workers: 0

model:
  embedding_dim: 96
  global_dim: 96
  edge_hidden_dim: 96
  num_message_passing_layers: 3
  num_latent_nodes: 1
  decoder_hidden_dim: 96
  dropout: 0.08
  use_layer_norm: true
  use_species_embeddings: true

loss:
  lambda_hidden_state: 1.0
  lambda_physics: 0.8
  lambda_sparse: 0.0002

train:
  device: cpu
  epochs: 60
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stopping_patience: 12
  checkpoint_name: best.pt

takens:
  tau: 1
  m: 6
  representative_species_index: 0

viz:
  max_observed_in_system_plot: 5
